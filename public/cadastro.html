<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Turma - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="imagem/favicon.png">
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto p-4 max-w-4xl">
        <div class="flex items-center gap-4 mb-8">
            <a href="dashboard.html" class="bg-white p-2 rounded shadow hover:bg-gray-50 transition">⬅ Voltar</a>
            <h1 class="text-2xl font-black text-red-600 uppercase">Nova Turma</h1>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg space-y-6">
            <div>
                <label class="block font-bold text-gray-700">1. NOME DA TURMA</label>
                <input type="text" id="turmaNome" class="w-full p-3 border rounded mt-1 outline-red-600" placeholder="Ex: 1 DS 2 SESI">
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block font-bold text-gray-700">2. LISTA DE ALUNOS</label>
                    <p class="text-[10px] text-gray-400 mb-2">Cole os nomes completos, um por linha.</p>
                    <textarea id="listaNomes" class="w-full h-64 p-3 border rounded text-sm font-mono focus:ring-2 ring-red-100 outline-none" placeholder="ANA SILVA&#10;BRUNO OLIVEIRA&#10;CARLOS SOUZA"></textarea>
                </div>

                <div>
                    <label class="block font-bold text-gray-700">3. PASTA DE FOTOS</label>
                    <p class="text-[10px] text-gray-400 mb-2">As fotos devem ter o nome do aluno (Ex: ANA SILVA.jpg)</p>
                    <div id="dropzone" onclick="document.getElementById('inputFotos').click()" class="border-4 border-dashed border-gray-200 h-64 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition">
                        <span class="text-4xl">📁</span>
                        <p class="text-sm font-bold text-gray-500 mt-2">Clique para selecionar as fotos</p>
                        <p id="contagemFotos" class="text-xs text-red-600 mt-1 font-bold"></p>
                        <input type="file" id="inputFotos" multiple accept="image/*" class="hidden" onchange="atualizarContagem()">
                    </div>
                </div>
            </div>

            <button onclick="cruzarDados()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-lg shadow-xl hover:bg-red-700 transition transform active:scale-95">
                🚀 FINALIZAR E CRUZAR DADOS
            </button>
        </div>

        <div id="log" class="mt-6 hidden bg-black text-green-400 p-4 rounded-lg font-mono text-xs overflow-y-auto max-h-60 border-2 border-gray-800">
        </div>
    </div>

<script>
    // Configurações de Conexão
    const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ'; // <-- SUBSTITUA PELA SUA KEY ANON (A COMPRIDA)
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // FUNÇÃO PARA REMOVER ACENTOS E CARACTERES ESPECIAIS (Crucial para as fotos carregarem)
    function normalizarTexto(texto) {
        return texto.toString().toLowerCase().trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Remove acentos
            .replace(/[^\w\s]/gi, '')       // Remove símbolos exceto letras e espaços
            .replace(/\s+/g, '_');          // Troca espaços por underline
    }

    function atualizarContagem() {
        const files = document.getElementById('inputFotos').files;
        document.getElementById('contagemFotos').innerText = `${files.length} fotos selecionadas`;
    }

    async function cruzarDados() {
        const turma = document.getElementById('turmaNome').value.trim();
        const nomesRaw = document.getElementById('listaNomes').value.split('\n').filter(n => n.trim() !== "");
        const fotos = document.getElementById('inputFotos').files;
        const log = document.getElementById('log');

        if(!turma || nomesRaw.length === 0) {
            alert("Preencha o nome da turma e cole a lista de alunos!");
            return;
        }

        log.classList.remove('hidden');
        log.innerHTML = `> [${new Date().toLocaleTimeString()}] Iniciando processamento de ${nomesRaw.length} alunos...<br><hr class='border-gray-800 my-2'>`;

        for (let nomeOriginal of nomesRaw) {
            const nomeLimpo = nomeOriginal.trim();
            const nomeNormalizado = normalizarTexto(nomeLimpo); // joao_silva
            
            // Busca a foto ignorando acentos no nome do arquivo original
            const fotoMatch = Array.from(fotos).find(f => {
                const nomeArquivoNormalizado = normalizarTexto(f.name.split('.')[0]);
                return nomeArquivoNormalizado === nomeNormalizado || nomeArquivoNormalizado.includes(nomeNormalizado);
            });

            let publicUrl = "";

            if (fotoMatch) {
                const extensao = fotoMatch.name.split('.').pop();
                // Nome do arquivo no Storage SEM ACENTOS
                const fileName = `${normalizarTexto(turma)}/${nomeNormalizado}_${Date.now()}.${extensao}`;

                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('fotos-alunos')
                    .upload(fileName, fotoMatch);

                if (uploadError) {
                    console.error("Erro no upload:", uploadError);
                    log.innerHTML += `<span class="text-yellow-500">> Erro ao subir foto de: ${nomeLimpo}</span><br>`;
                } else {
                    const { data: urlData } = _supabase.storage.from('fotos-alunos').getPublicUrl(fileName);
                    publicUrl = urlData.publicUrl;
                }
            } else {
                log.innerHTML += `<span class="text-gray-500">> Foto não encontrada para: ${nomeLimpo} (usando padrão)</span><br>`;
            }

            // Inserir no Banco de Dados
            const { error: dbError } = await _supabase.from('alunos').insert([{
                nome_completo: nomeLimpo,
                turma: turma,
                foto_url: publicUrl,
                status: 'Ativo',
                arquivado: false
            }]);

            if (!dbError) {
                log.innerHTML += `<span class="text-green-400">> ✅ ${nomeLimpo} cadastrado com sucesso.</span><br>`;
            } else {
                log.innerHTML += `<span class="text-red-500">> ❌ Erro ao salvar ${nomeLimpo}: ${dbError.message}</span><br>`;
            }
            
            // Auto-scroll do log
            log.scrollTop = log.scrollHeight;
        }
        
        log.innerHTML += `<hr class='border-gray-800 my-2'><span class="text-white font-bold">> FINALIZADO!</span>`;
        alert("Processamento concluído!");
    }
</script>
</body>

</html>
