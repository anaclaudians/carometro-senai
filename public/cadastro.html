<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Turma - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="imagem/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .senai-red { color: #E30613; }
        .bg-senai { background-color: #E30613; }
        .dropzone-active { border-color: #E30613; background-color: #fef2f2; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white border-b mb-8">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-5xl">
            <div class="flex items-center gap-2">
                <div class="bg-senai text-white px-3 py-1 rounded font-black text-xl">SENAI</div>
                <span class="text-gray-400 font-bold text-sm uppercase tracking-widest hidden md:inline">| Cadastro de Turma</span>
            </div>
            <a href="dashboard.html" class="text-gray-500 hover:text-red-600 font-bold text-sm transition flex items-center gap-2">
                <i class="fa fa-arrow-left"></i> VOLTAR
            </a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 overflow-hidden border border-gray-100">
            <div class="p-8">
                <h1 class="text-3xl font-black text-gray-900 uppercase mb-8 flex items-center gap-3">
                    <i class="fa fa-users-gear senai-red"></i> Configurar Nova Turma
                </h1>

                <div class="space-y-8">
                    <div class="relative">
                        <label class="text-[10px] font-black text-red-600 uppercase tracking-[0.2em] mb-2 block">1. Identificação da Turma</label>
                        <input type="text" id="turmaNome" 
                            class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-red-600 focus:bg-white transition-all text-lg font-bold text-gray-700" 
                            placeholder="Ex: 1 DS 2 SESI">
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-black text-red-600 uppercase tracking-[0.2em] mb-2 block">2. Lista de Chamada</label>
                            <p class="text-xs text-gray-400 mb-3 italic">Cole os nomes completos (um por linha).</p>
                            <textarea id="listaNomes" 
                                class="w-full flex-grow min-h-[300px] p-4 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm font-mono focus:border-red-600 focus:bg-white transition-all resize-none outline-none" 
                                placeholder="ANA SILVA&#10;BRUNO OLIVEIRA&#10;CARLOS SOUZA"></textarea>
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-black text-red-600 uppercase tracking-[0.2em] mb-2 block">3. Banco de Imagens</label>
                            <p class="text-xs text-gray-400 mb-3 italic">Arquivos devem ter o nome do aluno (Ex: JOÃO SILVA.jpg)</p>
                            <div id="dropzone" onclick="document.getElementById('inputFotos').click()" 
                                class="flex-grow border-4 border-dashed border-gray-100 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-red-200 hover:bg-red-50/30 transition-all group min-h-[300px]">
                                
                                <div class="bg-gray-100 group-hover:bg-red-600 group-hover:text-white w-16 h-16 rounded-full flex items-center justify-center text-2xl text-gray-400 transition-all mb-4">
                                    <i class="fa fa-cloud-arrow-up"></i>
                                </div>
                                <p class="text-sm font-black text-gray-600 group-hover:text-red-600 transition-colors uppercase">Selecionar Fotos</p>
                                <p id="contagemFotos" class="text-xs text-red-600 mt-2 font-bold px-4 py-1 bg-red-50 rounded-full hidden"></p>
                                <input type="file" id="inputFotos" multiple accept="image/*" class="hidden" onchange="atualizarContagem()">
                            </div>
                        </div>
                    </div>

                    <button onclick="cruzarDados()" 
                        class="w-full bg-red-600 hover:bg-red-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-red-200 transition-all transform hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center gap-3">
                        <i class="fa fa-rocket"></i> FINALIZAR E CRUZAR DADOS
                    </button>
                </div>
            </div>
        </div>

        <div id="logContainer" class="mt-8 hidden animate-in slide-in-from-bottom-4 duration-500">
            <div class="bg-slate-900 rounded-t-xl p-3 flex items-center gap-2 border-b border-slate-800">
                <div class="flex gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                </div>
                <span class="text-[10px] text-slate-500 font-black uppercase tracking-widest ml-2">Console de Processamento</span>
            </div>
            <div id="log" class="bg-slate-900 text-emerald-400 p-6 rounded-b-xl font-mono text-xs overflow-y-auto max-h-80 border-x-2 border-b-2 border-slate-900 leading-relaxed shadow-2xl">
            </div>
        </div>
    </div>

<script>
    // MANTIDA TODA A SUA LÓGICA ORIGINAL ABAIXO
    const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function normalizarTexto(texto) {
        return texto.toString().toLowerCase().trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") 
            .replace(/[^\w\s]/gi, '')       
            .replace(/\s+/g, '_');          
    }

    function atualizarContagem() {
        const files = document.getElementById('inputFotos').files;
        const label = document.getElementById('contagemFotos');
        if(files.length > 0) {
            label.innerText = `📂 ${files.length} fotos carregadas`;
            label.classList.remove('hidden');
        }
    }

    async function cruzarDados() {
        const turma = document.getElementById('turmaNome').value.trim();
        const nomesRaw = document.getElementById('listaNomes').value.split('\n').filter(n => n.trim() !== "");
        const fotos = document.getElementById('inputFotos').files;
        const log = document.getElementById('log');
        const logContainer = document.getElementById('logContainer');

        if(!turma || nomesRaw.length === 0) {
            alert("⚠️ Preencha o nome da turma e cole a lista de alunos!");
            return;
        }

        logContainer.classList.remove('hidden');
        log.innerHTML = `<span class="text-white">[${new Date().toLocaleTimeString()}] 🚀 Iniciando processamento de ${nomesRaw.length} alunos...</span><br><div class='my-2 border-b border-slate-800'></div>`;

        for (let nomeOriginal of nomesRaw) {
            const nomeLimpo = nomeOriginal.trim();
            const nomeNormalizado = normalizarTexto(nomeLimpo); 
            
            const fotoMatch = Array.from(fotos).find(f => {
                const nomeArquivoNormalizado = normalizarTexto(f.name.split('.')[0]);
                return nomeArquivoNormalizado === nomeNormalizado || nomeArquivoNormalizado.includes(nomeNormalizado);
            });

            let publicUrl = "";

            if (fotoMatch) {
                const extensao = fotoMatch.name.split('.').pop();
                const fileName = `${normalizarTexto(turma)}/${nomeNormalizado}_${Date.now()}.${extensao}`;

                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('fotos-alunos')
                    .upload(fileName, fotoMatch);

                if (uploadError) {
                    log.innerHTML += `<span class="text-amber-400">⚠️ Erro no upload: ${nomeLimpo}</span><br>`;
                } else {
                    const { data: urlData } = _supabase.storage.from('fotos-alunos').getPublicUrl(fileName);
                    publicUrl = urlData.publicUrl;
                }
            } else {
                log.innerHTML += `<span class="text-slate-500">ℹ️ Foto ausente: ${nomeLimpo} (padrão aplicado)</span><br>`;
            }

            const { error: dbError } = await _supabase.from('alunos').insert([{
                nome_completo: nomeLimpo,
                turma: turma,
                foto_url: publicUrl,
                status: 'Ativo',
                arquivado: false
            }]);

            if (!dbError) {
                log.innerHTML += `<span class="text-emerald-400">✅ ${nomeLimpo} cadastrado.</span><br>`;
            } else {
                log.innerHTML += `<span class="text-red-500">❌ Erro no banco: ${nomeLimpo}</span><br>`;
            }
            
            log.scrollTop = log.scrollHeight;
        }
        
        log.innerHTML += `<div class='my-2 border-b border-slate-800'></div><span class="text-white font-bold">🏁 PROCESSO CONCLUÍDO!</span>`;
        alert("🎉 Turma cadastrada com sucesso!");
    }
</script>
</body>
</html>
