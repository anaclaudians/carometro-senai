<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Carômetro SENAI</title>
     <link rel="icon" type="image/png" href="imagem/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --senai-red: #E30613; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .senai-gradient {
            background: linear-gradient(225deg, var(--senai-red) 0%, #9b040d 100%);
        }
        /* Efeito de flutuação para o card */
        .login-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .input-group:focus-within i {
            color: var(--senai-red);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="login-container flex flex-col md:flex-row max-w-4xl w-full bg-white rounded-[2rem] overflow-hidden">
        
        <div class="senai-gradient md:w-5/12 p-12 text-white flex flex-col justify-center items-center text-center relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-full"></div>
            <div class="absolute -bottom-10 -right-10 w-60 h-60 bg-black/10 rounded-full"></div>
            
            <div class="relative z-10">
                <h1 class="text-6xl font-black tracking-tighter mb-2">SENAI</h1>
                <div class="h-1 w-12 bg-white mx-auto mb-6"></div>
                <p class="text-sm font-light opacity-80 uppercase tracking-[0.3em]">Portal do Carômetro</p>
            </div>
            
            <div class="mt-12 hidden md:block">
                <i class="fas fa-id-badge text-8xl opacity-20"></i>
            </div>
        </div>

        <div class="md:w-7/12 p-8 md:p-16 bg-white">
            <div class="mb-10">
                <h2 class="text-3xl font-extrabold text-gray-800">Bem-vindo</h2>
                <p class="text-gray-400 text-sm mt-2">Acesse sua conta para consultar alunos e turmas.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest ml-1">CPF do Usuário</label>
                    <div class="input-group relative flex items-center">
                        <i class="fas fa-user absolute left-4 text-gray-300 transition-colors"></i>
                        <input type="text" id="cpfInput" required maxlength="14"
                            oninput="mascaraCPF(this)" aria-label="Digite seu CPF"
                            class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-[#E30613]/20 focus:border-[#E30613] outline-none transition-all text-sm"
                            placeholder="000.000.000-00">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest ml-1">Sua Senha</label>
                    <div class="input-group relative flex items-center">
                        <i class="fas fa-lock absolute left-4 text-gray-300 transition-colors"></i>
                        <input type="password" id="password" required  aria-label="Digite sua senha"
                            class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-[#E30613]/20 focus:border-[#E30613] outline-none transition-all text-sm"
                            placeholder="••••••••">
                        <button type="button" onclick="toggleSenha()" aria-label="Mostrar ou ocultar senha" class="absolute right-0 top-0 h-full w-12 flex items-center justify-center text-gray-300 hover:text-gray-500">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnLogin"
                    class="w-full bg-[#E30613] hover:bg-[#b0050f] text-white font-bold py-4 rounded-2xl shadow-lg shadow-[#E30613]/30 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                    <span>ENTRAR NO SISTEMA</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <button onclick="abrirModalSenha()" class="text-xs font-semibold text-gray-400 hover:text-red-600 transition-colors">
                    Esqueceu sua senha? <span class="text-red-500">Redefinir</span>
                </button>
            </div>
        </div>
    </div>

    <div id="modalSenha" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl scale-in-center">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-key text-2xl"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-800">Nova Senha</h3>
                <p class="text-gray-400 text-xs mt-2 font-medium leading-relaxed">Confirme seu CPF para realizar a alteração de segurança.</p>
            </div>
            
            <form id="updatePasswordForm" class="space-y-4">
                <input type="text" id="changeCpf" required oninput="mascaraCPF(this)" placeholder="Seu CPF" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-red-500 text-sm">
                <input type="password" id="newPassword" required placeholder="Nova senha" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-red-500 text-sm">
                <input type="password" id="confirmPassword" required placeholder="Confirme a nova senha" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-red-500 text-sm">
                
                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold hover:bg-gray-800 transition-all">SALVAR ALTERAÇÕES</button>
                    <button type="button" onclick="fecharModalSenha()" class="w-full py-2 text-xs font-bold text-gray-400 hover:text-gray-600 uppercase">Voltar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script type="module">
        import { _supabase, cpfToEmail } from './supabase-config.js';

        // Anexando funções globais para HTML
        window.toggleSenha = function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        window.mascaraCPF = function(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        };

        window.abrirModalSenha = function() { document.getElementById('modalSenha').classList.remove('hidden'); };
        window.fecharModalSenha = function() { document.getElementById('modalSenha').classList.add('hidden'); };

        // LOGIN COM SUPABASE AUTH INTEGRADO
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const cpf = document.getElementById('cpfInput').value;
            const senha = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> VERIFICANDO...`;

            try {
                // Tenta autenticar via API do Supabase Auth transformando o CPF num e-mail padrão fictício.
                const userEmail = cpfToEmail(cpf);
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: userEmail,
                    password: senha,
                });

                if (error) throw error; // Senha ou usuário incorreto do Supabase Auth.
                
                // Em caso de sucesso, enviamos primeiro para view, o auth-guard validará se é admin ou não e deixará ou n a rota de views ativa ou bloqueada,
                // na página de view o AuthGuard decide os elementos.
                window.location.href = "view.html"; 

            } catch (err) {
                console.error(err);
                alert("❌ Login Invalido! Verifique suas credenciais.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `ENTRAR NO SISTEMA <i class="fas fa-arrow-right text-xs"></i>`;
            }
        };

        // ALTERAÇÃO DE SENHA USANDO UPDATE DO NOVO MODELO (PRECISA SER VIA ADMIN - NO HTML APENAS COMO EXEMPLO CASO HOUVESSE A API EMAIL).
        // Aqui o reset password não funcionará corretamente para e-mail falso se a API do Supabase exigir verificação real.
        // O Supabase tem auth.resetPasswordForEmail mas requer que o email possa receber,
        // Como estamos usando email falso do senai, apenas um Admin pode alterar esta senha logada no Supabase panel.
        // Aqui atualizaremos SOMENTE a tabela local mas a session não será afetada (É apenas legad).
        document.getElementById('updatePasswordForm').onsubmit = async (e) => {
            e.preventDefault();
            alert("Atenção: Use a recuperação de senha via sistema administrativo central do SENAI. Contate seu gestor.");
            window.fecharModalSenha();
        };
    </script>
</body>
</html>
