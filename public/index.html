<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Carômetro SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --senai-red: #E30613; }
        .bg-senai { background-color: var(--senai-red); }
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        
        <div class="bg-[#E30613] p-8 text-center">
            <h1 class="text-white text-4xl font-black tracking-tighter">SENAI</h1>
            <p class="text-white/80 text-[10px] uppercase tracking-[0.2em] mt-2 font-bold">Sistema de Carômetro</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">CPF do Usuário</label>
                    <input type="text" id="cpfInput" required maxlength="14"
                        oninput="mascaraCPF(this)"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all"
                        placeholder="000.000.000-00">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Senha</label>
                    <input type="password" id="password" required 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <button type="submit" id="btnLogin"
                    class="w-full bg-[#E30613] hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                    ENTRAR NO SISTEMA
                </button>
            </form>

           
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Máscara de CPF
        function mascaraCPF(i) {
            let v = i.value;
            v = v.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        // Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const cpfFornecido = document.getElementById('cpfInput').value.replace(/\D/g, ""); // Remove pontos/traço
            const senhaFornecida = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "CARREGANDO...";

            // Busca na sua tabela 'usuarios'
            const { data: usuario, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('cpf', cpfFornecido) // Certifique-se que a coluna no banco se chama 'cpf'
                .single();

            if (error || !usuario) {
                alert("❌ Usuário não encontrado.");
                btn.disabled = false;
                btn.innerText = "ENTRAR NO SISTEMA";
                return;
            }

            if (usuario.senha === senhaFornecida) {
                localStorage.setItem('usuario_cpf', usuario.cpf);
                localStorage.setItem('usuario_nome', usuario.nome);

                if (senhaFornecida === "Senai1234") {
                    alert("⚠️ Segurança: Troque sua senha padrão agora!");
                }

                window.location.href = "dashboard.html";
            } else {
                alert("❌ Senha incorreta!");
                btn.disabled = false;
                btn.innerText = "ENTRAR NO SISTEMA";
            }
        };

        function abrirModalSenha() { document.getElementById('modalSenha').classList.remove('hidden'); }
        function fecharModalSenha() { document.getElementById('modalSenha').classList.add('hidden'); }

     document.getElementById('updatePasswordForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. Pega o CPF que foi salvo na hora do login
    const cpfLogado = localStorage.getItem('usuario_cpf');
    const nova = document.getElementById('newPassword').value;
    const confirma = document.getElementById('confirmPassword').value;

    console.log("Tentando alterar senha para o CPF:", cpfLogado); // Para debug

    if (!cpfLogado) {
        alert("Erro: CPF não encontrado no navegador. Faça login novamente.");
        window.location.href = 'index.html';
        return;
    }

    if (nova !== confirma) {
        alert("As senhas não coincidem!");
        return;
    }

    // 2. Tenta atualizar na tabela 'usuarios'
    // IMPORTANTE: Verifique se o nome da coluna no seu banco é 'senha' e 'cpf'
    const { data, error } = await _supabase
        .from('usuarios')
        .update({ senha: nova }) 
        .eq('cpf', cpfLogado)
        .select();

    if (error) {
        console.error("Erro detalhado do Supabase:", error);
        alert("Erro ao salvar no banco: " + error.message);
    } else {
        console.log("Resultado da atualização:", data);
        if (data.length === 0) {
            alert("Erro: O CPF logado não foi encontrado na tabela usuários.");
        } else {
            alert("✅ Senha alterada com sucesso!");
            fecharModalSenha();
        }
    }
};
    </script>
</body>
</html>
