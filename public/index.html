<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Carômetro SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --senai-red: #E30613; }
        .bg-senai { background-color: var(--senai-red); }
        .text-senai { color: var(--senai-red); }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        
        <div class="bg-[#E30613] p-8 text-center">
            <h1 class="text-white text-4xl font-black tracking-tighter">SENAI</h1>
            <p class="text-white/80 text-[10px] uppercase tracking-[0.2em] mt-2 font-bold">Sistema de Carômetro</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">E-mail</label>
                    <input type="email" id="email" required 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all"
                        placeholder="usuario@senai.br">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Senha</label>
                    <input type="password" id="password" required 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full bg-[#E30613] hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                    ENTRAR NO SISTEMA
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <button onclick="abrirModalSenha()" class="inline-flex items-center gap-2 text-gray-400 hover:text-red-600 transition-colors group">
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-red-50">
                        <i class="fa fa-user-gear"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-wider">Alterar senha padrão</span>
                </button>
            </div>

            <div id="msgErro" class="hidden mt-4 p-3 bg-red-50 text-red-700 text-xs rounded-lg border border-red-100 text-center font-bold"></div>
        </div>
    </div>

    <div id="modalSenha" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-black text-gray-800 text-center mb-2">NOVA SENHA</h3>
            <p class="text-gray-500 text-xs text-center mb-6 font-medium">Defina uma senha de sua preferência</p>
            
            <form id="updatePasswordForm" class="space-y-4">
                <input type="password" id="newPassword" required placeholder="Nova senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
                <input type="password" id="confirmPassword" required placeholder="Confirme a senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
                
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="fecharModalSenha()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase tracking-widest">Cancelar</button>
                    <button type="submit" class="flex-1 bg-black text-white py-3 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-gray-800">Salvar</button>
                </div>
            </form>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
     const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const nifFornecido = document.getElementById('nif').value;
    const senhaFornecida = document.getElementById('password').value;

    // Busca o funcionário na tabela 'usuarios' que criamos no SQL
    const { data: usuario, error } = await _supabase
        .from('usuarios')
        .select('*')
        .eq('', Fornecido)
        .single();

    if (error || !usuario) {
        alert("❌ Funcionário não encontrado (CPF incorreto).");
        return;
    }

    // Verifica a senha (em um sistema real usaríamos hash, aqui é comparação direta)
    if (usuario.senha === senhaFornecida) {
        
        // Alerta de senha padrão (Senai1234)
        if (senhaFornecida === "Senai1234") {
            alert("⚠️ SEGURANÇA: Você está usando a senha padrão. \nTroque sua senha no primeiro acesso!");
        }

        // Salva uma pequena sessão no navegador para saber quem logou
        localStorage.setItem('usuario_nif', usuario.nif);

        // REDIRECIONAMENTO: Vai para a página principal
        window.location.href = "dashboard.html";
        
    } else {
        alert("❌ Senha incorreta!");
    }
};
        // Funções de Interface
function abrirModalSenha() {
    document.getElementById('modalSenha').classList.remove('hidden');
}

function fecharModalSenha() {
    document.getElementById('modalSenha').classList.add('hidden');
}

// Lógica de Atualização no Supabase
document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        alert("As senhas não coincidem!");
        return;
    }

    // Tenta atualizar a senha do usuário logado
    const { data, error } = await _supabase.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert("Erro: " + error.message + "\n(Você precisa estar logado para mudar a senha)");
    } else {
        alert("Senha alterada com sucesso!");
        fecharModalSenha();
    }
});
    </script>


</html>
