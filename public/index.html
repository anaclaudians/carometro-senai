<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Carômetro SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --senai-red: #E30613; }
        .bg-senai { background-color: var(--senai-red); }
        .text-senai { color: var(--senai-red); }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-8 border-red-600">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-senai tracking-tighter">SENAI</h1>
            <p class="text-gray-500 uppercase text-xs font-bold tracking-widest">Carômetro Digital</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700">CPF DO FUNCIONÁRIO</label>
                <input type="text" id="nif" required class="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500" placeholder="00000000">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700">SENHA</label>
                <input type="password" id="password" required class="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-senai text-white py-3 rounded-md hover:bg-red-700 transition font-bold shadow-lg">ENTRAR</button>
        </form>
    </div>
    <div class="mt-6 flex justify-center">
    <button onclick="abrirModalSenha()" class="text-gray-400 hover:text-senai transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
        <i class="fa fa-user-gear text-lg"></i>
        Alterar Senha Padrão
    </button>
</div>

<div id="modalSenha" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 overflow-hidden">
        <div class="text-center mb-6">
            <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa fa-key text-senai text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800">Nova Senha</h3>
            <p class="text-gray-500 text-sm">Digite sua nova senha abaixo</p>
        </div>

        <form id="updatePasswordForm" class="space-y-4">
            <input type="password" id="newPassword" required 
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500"
                placeholder="Nova senha">
            <input type="password" id="confirmPassword" required 
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500"
                placeholder="Confirme a nova senha">
            
            <div class="flex gap-2">
                <button type="button" onclick="fecharModalSenha()" class="flex-1 px-4 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-all">CANCELAR</button>
                <button type="submit" class="flex-1 px-4 py-3 bg-senai text-white rounded-xl font-bold hover:bg-red-700 shadow-lg transition-all">SALVAR</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
     const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const nifFornecido = document.getElementById('nif').value;
    const senhaFornecida = document.getElementById('password').value;

    // Busca o funcionário na tabela 'usuarios' que criamos no SQL
    const { data: usuario, error } = await _supabase
        .from('usuarios')
        .select('*')
        .eq('', Fornecido)
        .single();

    if (error || !usuario) {
        alert("❌ Funcionário não encontrado (CPF incorreto).");
        return;
    }

    // Verifica a senha (em um sistema real usaríamos hash, aqui é comparação direta)
    if (usuario.senha === senhaFornecida) {
        
        // Alerta de senha padrão (Senai1234)
        if (senhaFornecida === "Senai1234") {
            alert("⚠️ SEGURANÇA: Você está usando a senha padrão. \nTroque sua senha no primeiro acesso!");
        }

        // Salva uma pequena sessão no navegador para saber quem logou
        localStorage.setItem('usuario_nif', usuario.nif);

        // REDIRECIONAMENTO: Vai para a página principal
        window.location.href = "dashboard.html";
        
    } else {
        alert("❌ Senha incorreta!");
    }
};
        // Funções de Interface
function abrirModalSenha() {
    document.getElementById('modalSenha').classList.remove('hidden');
}

function fecharModalSenha() {
    document.getElementById('modalSenha').classList.add('hidden');
}

// Lógica de Atualização no Supabase
document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        alert("As senhas não coincidem!");
        return;
    }

    // Tenta atualizar a senha do usuário logado
    const { data, error } = await _supabase.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert("Erro: " + error.message + "\n(Você precisa estar logado para mudar a senha)");
    } else {
        alert("Senha alterada com sucesso!");
        fecharModalSenha();
    }
});
    </script>
</body>

</html>
