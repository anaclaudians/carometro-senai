<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --senai-red: #E30613;
            --senai-dark: #1a1a1a;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }

        /* Estilo dos Cards */
        .aluno-card {
            background: white; border-radius: 20px; padding: 1.5rem 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05); display: flex;
            flex-direction: column; align-items: center; position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); cursor: pointer;
        }
        .aluno-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border-color: var(--senai-red); 
        }

        .foto-redonda {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 3px solid white;
            box-shadow: 0 0 0 2px var(--senai-red); background-color: #f1f5f9;
        }

        /* Selo de Evadido */
        .status-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px); display: flex; align-items: center;
            justify-content: center; border-radius: 20px; z-index: 5;
        }
        .status-tag {
            background: #000; color: #fff; font-size: 10px; font-weight: 900;
            padding: 6px 12px; border-radius: 4px; transform: rotate(-12deg);
        }

        /* Badges */
        .badge-icon { 
            display: inline-flex; width: 20px; height: 20px; 
            font-size: 10px; font-weight: bold; color: white; 
            border-radius: 5px; justify-content: center; align-items: center; 
        }

        /* Forçar cores que o Tailwind pode ignorar no JS */
        .bg-blue-600 { background-color: #2563eb !important; }
        .bg-purple-600 { background-color: #9333ea !important; }
        .bg-green-600 { background-color: #16a34a !important; }
        .bg-orange-600 { background-color: #ea580c !important; }
        .bg-yellow-500 { background-color: #eab308 !important; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-[#E30613] text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-4">
            <span class="font-black text-2xl tracking-tighter">SENAI</span>
            <h1 class="text-sm font-light border-l pl-4 border-white/30">Consulta de Alunos</h1>
        </div>
        
        <div class="flex gap-3">
            <button onclick="abrirModalSenha()" class="bg-white/20 hover:bg-white/30 text-white px-3 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2">
                <i class="fa fa-key"></i> SENHA
            </button>
            <button onclick="gerarPDF()" class="bg-white text-red-600 px-4 py-2 rounded-lg text-xs font-black shadow-md hover:bg-gray-100 flex items-center gap-2">
                <i class="fa fa-file-pdf"></i> GERAR PDF
            </button>
        </div>
    </header>

    <section class="bg-white p-4 shadow-sm border-b sticky top-[64px] z-40">
        <div class="container mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Pesquisar</label>
                <input type="text" id="inputBusca" oninput="filtrarAlunos()" placeholder="Nome do aluno..." class="w-full p-2 border rounded-lg text-sm outline-red-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Filtrar Turma</label>
                <select id="selectTurma" onchange="filtrarAlunos()" class="w-full p-2 border rounded-lg text-sm outline-red-500">
                    <option value="">Todas as Turmas Ativas</option>
                </select>
            </div>
            <div class="md:col-span-2 flex gap-2 overflow-x-auto">
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fPCD" onchange="filtrarAlunos()" class="hidden peer"><span class="px-3 py-1 bg-gray-200 peer-checked:bg-purple-600 peer-checked:text-white rounded-full text-[10px] font-bold uppercase transition">PCD</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fREP" onchange="filtrarAlunos()" class="hidden peer"><span class="px-3 py-1 bg-gray-200 peer-checked:bg-blue-600 peer-checked:text-white rounded-full text-[10px] font-bold uppercase transition">REP</span></label>
                 </div>
        </div>
    </section>

    <main id="alunoGrid" class="container mx-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></main>

    <div id="modalSenha" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-black text-gray-800 text-center mb-2">ALTERAR SENHA</h3>
            <form id="updatePasswordForm" class="space-y-4 mt-4">
                <input type="password" id="newPassword" required placeholder="Nova senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
                <input type="password" id="confirmPassword" required placeholder="Confirme a senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="fecharModalSenha()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase">Cancelar</button>
                    <button type="submit" class="flex-1 bg-red-600 text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function abrirModalSenha() { document.getElementById('modalSenha').classList.remove('hidden'); }
        function fecharModalSenha() { document.getElementById('modalSenha').classList.add('hidden'); }

        async function carregarTurmas() {
            const { data, error } = await _supabase.from('alunos').select('turma');
            if (error) return;
            const turmas = [...new Set(data.map(a => a.turma))].filter(Boolean).sort();
            const select = document.getElementById('selectTurma');
            turmas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                select.appendChild(opt);
            });
        }

        async function filtrarAlunos() {
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const turma = document.getElementById('selectTurma').value;
            let query = _supabase.from('alunos').select('*');
            if (turma) query = query.eq('turma', turma);
            
            const { data: alunos, error } = await query.order('nome_completo');
            if (error) return;

            const grid = document.getElementById('alunoGrid');
            grid.innerHTML = alunos.filter(a => a.nome_completo.toLowerCase().includes(busca)).map(aluno => `
                <div class="aluno-card">
                    <img src="${aluno.foto_url || 'https://via.placeholder.com/150'}" class="foto-redonda ${aluno.status === 'Evadido' ? 'grayscale opacity-50' : ''}">
                    <h3 class="text-[10px] font-black mt-3 text-center uppercase">${aluno.nome_completo}</h3>
                    <p class="text-[8px] font-bold text-gray-400">${aluno.turma}</p>
                    ${aluno.status === 'Evadido' ? '<div class="status-overlay"><span class="status-tag">EVADIDO</span></div>' : ''}
                </div>
            `).join('');
        }

        window.onload = () => { carregarTurmas(); filtrarAlunos(); };
        async function gerarPDF() {
    const elemento = document.getElementById('alunoGrid');
    const turmaSelecionada = document.getElementById('selectTurma').value || "Geral";
    
    // Mostra um aviso de carregamento (opcional)
    const btn = event.currentTarget;
    const textoOriginal = btn.innerHTML;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> GERANDO...';

    const opcoes = {
        margin: [10, 5, 10, 5], // margens: cima, esquerda, baixo, direita
        filename: `Carometro_SENAI_${turmaSelecionada}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true, // ESSENCIAL para carregar fotos do Supabase no PDF
            letterRendering: true
        },
        jsPDF: { 
            unit: 'mm', 
            format: 'a4', 
            orientation: 'portrait' 
        }
    };

    try {
        await html2pdf().set(opcoes).from(elemento).save();
    } catch (erro) {
        console.error("Erro ao gerar PDF:", erro);
        alert("Erro ao gerar o arquivo. Verifique se as fotos carregaram corretamente.");
    } finally {
        btn.innerHTML = textoOriginal;
    }
}
    </script>
</body>
</html>
