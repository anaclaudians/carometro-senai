<header class="bg-[#E30613] text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
    <div class="flex items-center gap-4">
        <span class="font-black text-2xl tracking-tighter">SENAI</span>
        <h1 class="text-sm font-light border-l pl-4 border-white/30">Consulta de Alunos</h1>
    </div>
    
    <div class="flex gap-3">
        <button onclick="abrirModalSenha()" class="bg-white/20 hover:bg-white/30 text-white px-3 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2">
            <i class="fa fa-key"></i> SENHA
        </button>
        
        <button onclick="gerarPDF()" class="bg-white text-red-600 px-4 py-2 rounded-lg text-xs font-black shadow-md hover:bg-gray-100 flex items-center gap-2">
            <i class="fa fa-file-pdf"></i> GERAR PDF
        </button>
    </div>
</header>

<div id="modalSenha" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
        <h3 class="text-xl font-black text-gray-800 text-center mb-2">ALTERAR SENHA</h3>
        <p class="text-gray-500 text-xs text-center mb-6 font-medium">Digite sua nova senha de acesso</p>
        
        <form id="updatePasswordForm" class="space-y-4">
            <input type="password" id="newPassword" required placeholder="Nova senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
            <input type="password" id="confirmPassword" required placeholder="Confirme a senha" class="w-full px-4 py-3 border rounded-xl outline-red-500">
            
            <div class="flex gap-2 pt-2">
                <button type="button" onclick="fecharModalSenha()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase tracking-widest text-gray-400">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#E30613] text-white py-3 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-red-700 transition">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 1. CORREÇÃO DAS CREDENCIAIS (Use as que você me passou antes)
    const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. FUNÇÕES DO MODAL DE SENHA
    function abrirModalSenha() { document.getElementById('modalSenha').classList.remove('hidden'); }
    function fecharModalSenha() { document.getElementById('modalSenha').classList.add('hidden'); }

    document.getElementById('updatePasswordForm').onsubmit = async (e) => {
        e.preventDefault();
        const cpf = localStorage.getItem('usuario_cpf');
        const nova = document.getElementById('newPassword').value;
        const confirma = document.getElementById('confirmPassword').value;

        if (nova !== confirma) { alert("As senhas não coincidem!"); return; }
        if (!cpf) { alert("Erro: Usuário não identificado. Faça login novamente."); window.location.href='index.html'; return; }

        const { error } = await _supabase.from('usuarios').update({ senha: nova }).eq('cpf', cpf);
        if (error) { alert("Erro: " + error.message); } 
        else { alert("✅ Senha alterada!"); fecharModalSenha(); }
    };

    // 3. CORREÇÃO DA CARGA DE DADOS (Removi o filtro 'arquivado' se ele não existir no seu banco)
    async function carregarTurmas() {
        const { data, error } = await _supabase.from('alunos').select('turma');
        if (error) { console.error(error); return; }
        const turmasUnicas = [...new Set(data.map(a => a.turma))].filter(Boolean).sort();
        const select = document.getElementById('selectTurma');
        select.innerHTML = '<option value="">Todas as Turmas Ativas</option>';
        turmasUnicas.forEach(t => {
            const option = document.createElement('option');
            option.value = t; option.textContent = t;
            select.appendChild(option);
        });
    }

    async function filtrarAlunos() {
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        const turma = document.getElementById('selectTurma').value;
        
        let query = _supabase.from('alunos').select('*');

        // Filtros Ativos
        if (turma) query = query.eq('turma', turma);
        if (document.getElementById('fPCD').checked) query = query.not('pcd_tipo', 'is', null);
        if (document.getElementById('fREP').checked) query = query.eq('representante', true);
        if (document.getElementById('fAAPM').checked) query = query.eq('aapm', true);
        if (document.getElementById('fNPAADC').checked) query = query.eq('npaadc', true);
        if (document.getElementById('fSKILLS').checked) query = query.eq('spskills', true);

        const { data: alunos, error } = await query.order('nome_completo');
        if (error) { console.error(error); return; }

        const filtrados = alunos.filter(a => a.nome_completo.toLowerCase().includes(busca));
        renderizarCards(filtrados);
    }
    // ... manter o restante das funções renderizarCards, abrirZoom, etc ...
</script>
