<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Visualização de Alunos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --senai-red: #E30613; }
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }

        /* Estilo dos Cards Refinado */
        .aluno-card {
            background: white; border-radius: 20px; padding: 1.5rem 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05); display: flex;
            flex-direction: column; align-items: center; position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); cursor: pointer;
        }
        .aluno-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border-color: var(--senai-red); 
        }

        .foto-redonda {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 3px solid white;
            box-shadow: 0 0 0 2px var(--senai-red); background-color: #f1f5f9;
        }

        .status-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px); display: flex; align-items: center;
            justify-content: center; border-radius: 20px; z-index: 5;
        }
        .status-tag {
            background: #000; color: #fff; font-size: 10px; font-weight: 900;
            padding: 6px 12px; border-radius: 4px; transform: rotate(-12deg);
        }

        .badge-icon { 
            display: inline-flex; width: 22px; height: 22px; 
            font-size: 11px; font-weight: bold; color: white; 
            border-radius: 6px; justify-content: center; align-items: center; 
        }

        /* Cores Fixas */
        .bg-blue-600 { background-color: #2563eb !important; }
        .bg-purple-600 { background-color: #9333ea !important; }
        .bg-green-600 { background-color: #16a34a !important; }
        .bg-orange-600 { background-color: #ea580c !important; }
        .bg-yellow-500 { background-color: #eab308 !important; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-[#E30613] text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter">SENAI</h1>
            <span class="hidden md:inline border-l border-white/30 pl-4 text-xs font-bold opacity-80 uppercase tracking-widest">Carômetro Digital</span>
        </div>
        
        <div class="flex gap-2">
            <button onclick="gerarPDF()" class="bg-white text-red-600 px-4 py-2 rounded-lg text-[10px] font-black shadow-md hover:bg-gray-100 flex items-center gap-2 transition">
                <i class="fa fa-file-pdf"></i> PDF
            </button>
            <button onclick="fazerLogout()" class="bg-black/20 hover:bg-black/40 text-white px-4 py-2 rounded-lg text-[10px] font-black border border-white/20 flex items-center gap-2 transition">
                <i class="fa fa-sign-out-alt"></i> SAIR
            </button>
        </div>
    </header>

    <section class="bg-white p-4 shadow-sm border-b sticky top-[64px] z-40">
        <div class="container mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Pesquisar</label>
                <div class="relative flex items-center">
                    <i class="fa fa-search absolute left-3 text-gray-300 text-xs"></i>
                    <input type="text" id="inputBusca" oninput="filtrarAlunos()" placeholder="Nome do aluno..." class="w-full pl-9 p-2 border border-gray-100 bg-gray-50 rounded-lg text-sm outline-red-500">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Turma</label>
                <select id="selectTurma" onchange="filtrarAlunos()" class="w-full p-2 border border-gray-100 bg-gray-50 rounded-lg text-sm outline-red-500">
                    <option value="">Todas as Turmas Ativas</option>
                </select>
            </div>
            <div class="md:col-span-2 flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fPCD" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-purple-600 peer-checked:text-white rounded-xl text-[10px] font-bold uppercase transition">PCD</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fREP" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-blue-600 peer-checked:text-white rounded-xl text-[10px] font-bold uppercase transition">REP</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fAAPM" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-green-600 peer-checked:text-white rounded-xl text-[10px] font-bold uppercase transition">AAPM</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fNPAADC" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-orange-600 peer-checked:text-white rounded-xl text-[10px] font-bold uppercase transition">NPAADC</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fSKILLS" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-yellow-500 peer-checked:text-white rounded-xl text-[10px] font-bold uppercase transition">SKILLS</span></label>
            </div>
        </div>
    </section>

    <main id="alunoGrid" class="container mx-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></main>

    <div id="modalZoom" class="hidden fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4 backdrop-blur-md" onclick="fecharZoom()">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="relative">
                <img id="zoomFoto" src="" class="w-full h-80 object-cover">
                <button onclick="fecharZoom()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-2xl font-bold transition hover:bg-red-600">&times;</button>
            </div>
            <div class="p-8 text-center">
                <h2 id="zoomNome" class="text-xl font-black text-gray-800 uppercase mb-1 leading-tight"></h2>
                <p id="zoomTurma" class="text-xs font-bold text-red-600 uppercase mb-6"></p>
                <div id="zoomBadges" class="flex flex-wrap justify-center gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function fazerLogout() {
            localStorage.clear();
            window.location.href = "index.html"; // Altere para o seu arquivo de login
        }

        async function carregarTurmas() {
            const { data, error } = await _supabase.from('alunos').select('turma');
            if (error) return;
            const turmas = [...new Set(data.map(a => a.turma))].filter(Boolean).sort();
            const select = document.getElementById('selectTurma');
            turmas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                select.appendChild(opt);
            });
        }

        function renderizarCards(alunos) {
            const grid = document.getElementById('alunoGrid');
            if (alunos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20"><i class="fa fa-user-slash text-gray-200 text-5xl mb-4"></i><p class="text-gray-400 font-bold uppercase text-xs tracking-widest">Nenhum aluno nesta categoria</p></div>';
                return;
            }

            grid.innerHTML = alunos.map(aluno => {
                const isEvadido = aluno.status === 'Evadido';
                const alunoString = JSON.stringify(aluno).replace(/'/g, "&apos;");
                
                return `
                    <div class="aluno-card" onclick='abrirZoom(${alunoString})'>
                        <img src="${aluno.foto
