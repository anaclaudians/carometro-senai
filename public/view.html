<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - View Alunos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="imagem/favicon.png">
    
    <style>
        :root { --senai-red: #E30613; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }

        .aluno-card {
            background: white; border-radius: 20px; padding: 1.5rem 1rem;
            transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; 
            position: relative; cursor: pointer;
        }
        .aluno-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-color: var(--senai-red); 
        }

        .foto-redonda {
            width: 90px; height: 90px; border-radius: 50%;
            object-fit: cover; border: 3px solid white;
            box-shadow: 0 0 0 2px var(--senai-red); background-color: #e5e7eb;
        }

        .status-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(1px); display: flex; align-items: center;
            justify-content: center; border-radius: 20px; z-index: 5;
        }
        .status-tag {
            background: #000; color: #fff; font-size: 9px; font-weight: 900;
            padding: 4px 10px; border-radius: 4px; transform: rotate(-10deg);
        }

        .badge-icon { 
            display: inline-flex; width: 20px; height: 20px; 
            font-size: 10px; font-weight: bold; color: white; 
            border-radius: 5px; justify-content: center; align-items: center; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

        <div class="flex items-center gap-3">

            <button onclick="gerarPDF()" class="bg-white/20 hover:bg-white text-white hover:text-red-600 px-3 py-2 rounded-lg text-[10px] font-bold transition flex items-center gap-2">
                <i class="fa fa-print"></i> PDF

            <button onclick="fazerLogout()" class="bg-black/20 hover:bg-black text-white px-3 py-2 rounded-lg text-[10px] font-bold transition flex items-center gap-2">

    <section class="bg-white p-4 shadow-sm border-b sticky top-[64px] z-40">
        <div class="container mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">Localizar Aluno</label>
                <input type="text" id="inputBusca" oninput="filtrarAlunos()" placeholder="Digite o nome..." class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-red-500 transition-all focus:bg-white">
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">Turma Ativa</label>
                <select id="selectTurma" onchange="filtrarAlunos()" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-red-500 cursor-pointer">
                    <option value="">Todas as Turmas</option>
                </select>
            </div>
            <div class="md:col-span-2 flex gap-2 overflow-x-auto no-scrollbar py-1">
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fPCD" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-purple-600 peer-checked:text-white rounded-xl text-[10px] font-black uppercase transition-all">PCD</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fREP" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-blue-600 peer-checked:text-white rounded-xl text-[10px] font-black uppercase transition-all">REP</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fAAPM" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-green-600 peer-checked:text-white rounded-xl text-[10px] font-black uppercase transition-all">AAPM</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fNPAADC" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-orange-600 peer-checked:text-white rounded-xl text-[10px] font-black uppercase transition-all">NPAADC</span></label>
                 <label class="flex-shrink-0 cursor-pointer"><input type="checkbox" id="fSKILLS" onchange="filtrarAlunos()" class="hidden peer"><span class="px-4 py-2 bg-gray-100 peer-checked:bg-yellow-500 peer-checked:text-white rounded-xl text-[10px] font-black uppercase transition-all">SKILLS</span></label>
            </div>
        </div>
    </section>

    <main id="alunoGrid" class="container mx-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <div class="col-span-full text-center py-20 text-gray-400">
            <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest">Carregando dados...</p>
        </div>
    </main>

    <div id="modalZoom" class="hidden fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4 backdrop-blur-sm" onclick="fecharZoom()">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="relative">
                <img id="zoomFoto" src="" class="w-full h-80 object-cover bg-gray-100">
                <button onclick="fecharZoom()" class="absolute top-4 right-4 bg-white text-black w-10 h-10 rounded-full flex items-center justify-center text-2xl font-bold">&times;</button>
            </div>
            <div class="p-8 text-center">
                <h2 id="zoomNome" class="text-xl font-black text-gray-800 uppercase mb-1"></h2>
                <p id="zoomTurma" class="text-xs font-bold text-red-600 uppercase mb-6"></p>
                <div id="zoomBadges" class="flex flex-wrap justify-center gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zdhpyflnyopwhgvbpibf.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_xZGVQv0UWu_cauVfQoiL6Q_RRytQozQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function fazerLogout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        async function carregarTurmas() {
            try {
                const { data, error } = await _supabase.from('alunos').select('turma');
                if (error) throw error;
                const turmasUnicas = [...new Set(data.map(a => a.turma))].filter(Boolean).sort();
                const select = document.getElementById('selectTurma');
                select.innerHTML = '<option value="">Todas as Turmas</option>';
                turmasUnicas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t; opt.textContent = t;
                    select.appendChild(opt);
                });
            } catch (err) { console.error("Erro turmas:", err.message); }
        }

        async function filtrarAlunos() {
            const grid = document.getElementById('alunoGrid');
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const turmaSelecionada = document.getElementById('selectTurma').value;
            
            let query = _supabase.from('alunos').select('*');

            if (turmaSelecionada) query = query.eq('turma', turmaSelecionada);
            
            if (document.getElementById('fPCD').checked) {
                query = query.neq('pcd_tipo', '').not('pcd_tipo', 'is', null);
            }
            if (document.getElementById('fREP').checked) query = query.eq('representante', true);
            if (document.getElementById('fAAPM').checked) query = query.eq('aapm', true);
            if (document.getElementById('fNPAADC').checked) query = query.eq('npaadc', true);
            if (document.getElementById('fSKILLS').checked) query = query.eq('spskills', true);

            try {
                const { data: alunos, error } = await query.order('nome_completo');
                if (error) throw error;

                const filtrados = alunos.filter(a => a.nome_completo?.toLowerCase().includes(busca));
                
                if (filtrados.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-bold uppercase text-xs">Nenhum aluno encontrado</p>';
                    return;
                }

                grid.innerHTML = filtrados.map(aluno => {
                    const isEvadido = aluno.status === 'Evadido';
                    const temPCD = aluno.pcd_tipo && aluno.pcd_tipo.trim() !== "";
                    const alunoJSON = JSON.stringify(aluno).replace(/'/g, "&apos;");
                    
                    return `
                        <div class="aluno-card" onclick='abrirZoom(${alunoJSON})'>
                            <img src="${aluno.foto_url || 'https://via.placeholder.com/150'}" class="foto-redonda ${isEvadido ? 'grayscale opacity-40' : ''}">
                            <h3 class="text-[10px] font-black mt-3 text-center uppercase leading-tight h-6 overflow-hidden">${aluno.nome_completo}</h3>
                            <p class="text-[9px] font-bold text-gray-400 mt-1">${aluno.turma}</p>
                            <div class="flex gap-1 mt-3">
                                ${aluno.representante ? '<div class="badge-icon bg-blue-600">R</div>' : ''}
                                ${temPCD ? '<div class="badge-icon bg-purple-600">P</div>' : ''}
                                ${aluno.aapm ? '<div class="badge-icon bg-green-600">A</div>' : ''}
                                ${aluno.npaadc ? '<div class="badge-icon bg-orange-600">N</div>' : ''}
                                ${aluno.spskills ? '<div class="badge-icon bg-yellow-500">S</div>' : ''}
                            </div>
                            ${isEvadido ? '<div class="status-overlay"><span class="status-tag">EVADIDO</span></div>' : ''}
                        </div>`;
                }).join('');
            } catch (err) { console.error("Erro busca:", err.message); }
        }

        function abrirZoom(aluno) {
            document.getElementById('zoomFoto').src = aluno.foto_url || 'https://via.placeholder.com/150';
            document.getElementById('zoomNome').innerText = aluno.nome_completo;
            document.getElementById('zoomTurma').innerText = aluno.turma;
            let bHtml = '';
            if(aluno.status === 'Evadido') bHtml += '<span class="bg-black text-white px-3 py-1 rounded text-[10px] font-black uppercase">EVADIDO</span>';
            if(aluno.representante) bHtml += '<span class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase">REPRESENTANTE</span>';
            if(aluno.pcd_tipo) bHtml += `<span class="bg-purple-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase">PCD: ${aluno.pcd_tipo}</span>`;
            if(aluno.aapm) bHtml += '<span class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase">AAPM</span>';
            if(aluno.npaadc) bHtml += '<span class="bg-orange-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase">NPAADC</span>';
            if(aluno.spskills) bHtml += '<span class="bg-yellow-500 text-white px-3 py-1 rounded text-[10px] font-black uppercase">SP SKILLS</span>';
            document.getElementById('zoomBadges').innerHTML = bHtml;
            document.getElementById('modalZoom').classList.remove('hidden');
        }

        function fecharZoom() { document.getElementById('modalZoom').classList.add('hidden'); }

        async function gerarPDF() {
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const grid = document.getElementById('alunoGrid');
            const opt = { margin: 10, filename: 'carometro.pdf', html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }};
            try { await html2pdf().set(opt).from(grid).save(); } 
            finally { btn.innerHTML = original; }
        }

        window.onload = async () => {
            await carregarTurmas();
            await filtrarAlunos();
        };
    </script>
</body>
</html>
